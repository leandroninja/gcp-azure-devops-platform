name: Scan de Segurança Completo

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]
  schedule:
    # Executa diariamente às 02:00 UTC
    - cron: "0 2 * * *"

permissions:
  contents: read
  security-events: write
  pull-requests: write
  packages: read

concurrency:
  group: security-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # JOB: Scan de Imagens Docker com Trivy
  # ---------------------------------------------------------------------------
  container-scan:
    name: Trivy — Scan de Vulnerabilidades em Containers
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build imagem para scan (sem push)
        uses: docker/build-push-action@v5
        with:
          context: apps/sample-app
          file: apps/sample-app/Dockerfile
          push: false
          tags: sample-app:scan-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker

      - name: Trivy — scan de vulnerabilidades HIGH e CRITICAL
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "sample-app:scan-${{ github.sha }}"
          format: "sarif"
          output: "trivy-container.sarif"
          severity: "HIGH,CRITICAL"
          ignore-unfixed: true
          vuln-type: "os,library"

      - name: Upload resultado Trivy para GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-container.sarif
          category: trivy-container

      - name: Trivy — relatório tabular para log
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "sample-app:scan-${{ github.sha }}"
          format: "table"
          exit-code: "1"
          severity: "CRITICAL"
          vuln-type: "os,library"
        continue-on-error: true

      - name: Trivy — scan do filesystem (Dockerfile e dependências)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "apps/sample-app"
          format: "sarif"
          output: "trivy-fs.sarif"
          severity: "HIGH,CRITICAL"

      - name: Upload resultado Trivy FS para GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-filesystem

  # ---------------------------------------------------------------------------
  # JOB: Scan de IaC (tfsec + checkov + infracost)
  # ---------------------------------------------------------------------------
  iac-scan:
    name: Scan IaC (tfsec + checkov)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: tfsec — análise completa do Terraform
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: terraform
          soft_fail: true
          format: sarif
          additional_args: "--minimum-severity HIGH"
        continue-on-error: true

      - name: Upload tfsec para GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: results.sarif
          category: tfsec-full
        continue-on-error: true

      - name: Setup Python para Checkov e Safety
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar ferramentas de segurança Python
        run: |
          pip install checkov safety

      - name: Checkov — análise completa de todos os módulos Terraform
        run: |
          checkov \
            --directory terraform \
            --framework terraform \
            --output sarif \
            --soft-fail \
            --compact \
            --quiet \
            --skip-check CKV_GCP_9 \
            > checkov-terraform.sarif 2>/dev/null || true

          checkov \
            --directory apps \
            --framework dockerfile \
            --output sarif \
            --soft-fail \
            --compact \
            > checkov-docker.sarif 2>/dev/null || true

          checkov \
            --directory apps/sample-app/k8s \
            --framework kubernetes \
            --output sarif \
            --soft-fail \
            --compact \
            > checkov-k8s.sarif 2>/dev/null || true
        continue-on-error: true

      - name: Upload resultados Checkov para GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov-terraform.sarif
          category: checkov-terraform
        continue-on-error: true

      - name: Upload Checkov Docker para GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov-docker.sarif
          category: checkov-dockerfile
        continue-on-error: true

      - name: Upload Checkov K8s para GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov-k8s.sarif
          category: checkov-kubernetes
        continue-on-error: true

  # ---------------------------------------------------------------------------
  # JOB: SAST — Análise Estática de Código Fonte
  # ---------------------------------------------------------------------------
  sast:
    name: SAST — Semgrep (Python e IaC)
    runs-on: ubuntu-latest

    container:
      image: returntocorp/semgrep

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Semgrep — análise Python (segurança e boas práticas)
        run: |
          semgrep \
            --config "p/python" \
            --config "p/owasp-top-ten" \
            --config "p/secrets" \
            --sarif \
            --output semgrep-python.sarif \
            apps/ \
            || true

      - name: Semgrep — análise de configurações de infraestrutura
        run: |
          semgrep \
            --config "p/terraform" \
            --config "p/dockerfile" \
            --config "p/kubernetes" \
            --sarif \
            --output semgrep-iac.sarif \
            . \
            || true

      - name: Upload resultado Semgrep Python para GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep-python.sarif
          category: semgrep-python

      - name: Upload resultado Semgrep IaC para GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep-iac.sarif
          category: semgrep-iac

  # ---------------------------------------------------------------------------
  # JOB: Detecção de Secrets expostos (Gitleaks)
  # ---------------------------------------------------------------------------
  secret-scan:
    name: Gitleaks — Detecção de Secrets Expostos
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório (histórico completo)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks — scan de todo o histórico Git
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Upload resultado Gitleaks para GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: results.sarif
          category: gitleaks
        continue-on-error: true

  # ---------------------------------------------------------------------------
  # JOB: Scan de Dependências (Safety + npm audit)
  # ---------------------------------------------------------------------------
  dependency-scan:
    name: Scan de Dependências (Python + npm)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependências
        run: |
          pip install safety pip-audit
          if [ -f apps/sample-app/requirements.txt ]; then
            pip install -r apps/sample-app/requirements.txt
          fi

      - name: Safety — scan de vulnerabilidades em pacotes Python
        run: |
          safety check \
            --file apps/sample-app/requirements.txt \
            --output json \
            --save-json safety-report.json \
            || true

          # Exibe relatório no log
          safety check \
            --file apps/sample-app/requirements.txt \
            || echo "Vulnerabilidades encontradas — verificar safety-report.json"
        continue-on-error: true

      - name: pip-audit — auditoria detalhada de dependências Python
        run: |
          pip-audit \
            -r apps/sample-app/requirements.txt \
            --format json \
            -o pip-audit-report.json \
            || true
        continue-on-error: true

      - name: Setup Node.js (para npm audit se houver package.json)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: npm audit — scan de dependências JavaScript
        run: |
          if [ -f package.json ]; then
            npm audit --json > npm-audit-report.json || true
            npm audit || echo "Vulnerabilidades npm encontradas — verificar npm-audit-report.json"
          else
            echo "Sem package.json encontrado — pulando npm audit"
          fi
        continue-on-error: true

      - name: Upload relatórios de dependências como artefatos
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-scan-reports
          path: |
            safety-report.json
            pip-audit-report.json
            npm-audit-report.json
          retention-days: 30

  # ---------------------------------------------------------------------------
  # JOB: Sumário final dos scans (comentário no PR)
  # ---------------------------------------------------------------------------
  scan-summary:
    name: Sumário dos Scans de Segurança
    runs-on: ubuntu-latest
    needs: [container-scan, iac-scan, sast, secret-scan, dependency-scan]
    if: always() && github.event_name == 'pull_request'

    steps:
      - name: Publicar sumário no PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: security-scan-summary
          message: |
            ## Scans de Segurança — Resumo

            | Scan | Status |
            |------|--------|
            | Trivy (Containers) | ${{ needs.container-scan.result == 'success' && '✅ OK' || '⚠️ Ver alertas' }} |
            | tfsec + Checkov (IaC) | ${{ needs.iac-scan.result == 'success' && '✅ OK' || '⚠️ Ver alertas' }} |
            | Semgrep (SAST) | ${{ needs.sast.result == 'success' && '✅ OK' || '⚠️ Ver alertas' }} |
            | Gitleaks (Secrets) | ${{ needs.secret-scan.result == 'success' && '✅ Nenhum secret exposto' || '❌ Possíveis secrets detectados!' }} |
            | Safety/npm audit (Deps) | ${{ needs.dependency-scan.result == 'success' && '✅ OK' || '⚠️ Ver alertas' }} |

            Acesse a aba **Security → Code Scanning Alerts** para ver todos os detalhes.

            > Scan executado em: `${{ github.sha }}`
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

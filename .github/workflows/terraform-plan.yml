name: Terraform Plan — GCP e Azure

on:
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-plan.yml"

permissions:
  contents: read
  pull-requests: write
  id-token: write          # Necessário para OIDC (GCP e Azure)
  security-events: write   # Para upload de resultados SARIF

concurrency:
  group: terraform-plan-${{ github.ref }}
  cancel-in-progress: true

env:
  TF_VERSION: "1.7.5"
  TFSEC_VERSION: "v1.28.4"

jobs:
  # ---------------------------------------------------------------------------
  # JOB: Scan de Segurança na Infraestrutura como Código
  # ---------------------------------------------------------------------------
  security-scan:
    name: Scan de Segurança IaC (tfsec + checkov)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: tfsec — scan de segurança GCP
        uses: aquasecurity/tfsec-sarif-action@v0.1.4
        with:
          sarif_file: tfsec-gcp-results.sarif
          working_directory: terraform/modules/gcp
          tfsec_version: ${{ env.TFSEC_VERSION }}
          tfsec_args: "--include-passed --format sarif"

      - name: tfsec — scan de segurança Azure
        uses: aquasecurity/tfsec-sarif-action@v0.1.4
        with:
          sarif_file: tfsec-azure-results.sarif
          working_directory: terraform/modules/azure
          tfsec_version: ${{ env.TFSEC_VERSION }}
          tfsec_args: "--include-passed --format sarif"

      - name: Upload resultados tfsec para GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: tfsec-gcp-results.sarif
          category: tfsec-gcp

      - name: Upload resultados tfsec Azure para GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: tfsec-azure-results.sarif
          category: tfsec-azure

      - name: Setup Python para Checkov
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar Checkov
        run: pip install checkov

      - name: Checkov — análise completa da infraestrutura GCP
        run: |
          checkov \
            --directory terraform/modules/gcp \
            --framework terraform \
            --output sarif \
            --output-file checkov-gcp-results.sarif \
            --soft-fail \
            --compact \
            --quiet
        continue-on-error: true

      - name: Checkov — análise completa da infraestrutura Azure
        run: |
          checkov \
            --directory terraform/modules/azure \
            --framework terraform \
            --output sarif \
            --output-file checkov-azure-results.sarif \
            --soft-fail \
            --compact \
            --quiet
        continue-on-error: true

      - name: Upload resultados Checkov GCP para GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov-gcp-results.sarif
          category: checkov-gcp

      - name: Upload resultados Checkov Azure para GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov-azure-results.sarif
          category: checkov-azure

  # ---------------------------------------------------------------------------
  # JOB: Terraform Plan — GCP
  # ---------------------------------------------------------------------------
  terraform-plan-gcp:
    name: Terraform Plan GCP
    runs-on: ubuntu-latest
    needs: security-scan
    environment: gcp-plan

    outputs:
      plan_exitcode: ${{ steps.plan.outputs.exitcode }}
      plan_summary:  ${{ steps.plan_summary.outputs.summary }}

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Autenticar no GCP via Workload Identity Federation
        id: auth_gcp
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Setup Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: true

      - name: Terraform Init — GCP
        id: init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.AZURE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.AZURE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ secrets.AZURE_STORAGE_CONTAINER }}" \
            -backend-config="key=gcp-azure-platform/terraform.tfstate" \
            -reconfigure
        env:
          ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC:        "true"

      - name: Terraform Validate — verifica sintaxe
        id: validate
        working-directory: terraform
        run: terraform validate -no-color

      - name: Terraform Plan — GCP (módulos GCP apenas)
        id: plan
        working-directory: terraform
        run: |
          terraform plan \
            -var="gcp_project_id=${{ secrets.GCP_PROJECT_ID }}" \
            -var="gcp_region=us-central1" \
            -var="azure_subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            -var="azure_location=eastus" \
            -var="azure_cicd_principal_id=${{ secrets.AZURE_CLIENT_ID }}" \
            -var="environment=production" \
            -var="app_name=devops-platform" \
            -var="github_org=${{ github.repository_owner }}" \
            -var="github_repo=${{ github.event.repository.name }}" \
            -target=module.gcp_networking \
            -target=module.gcp_iam \
            -target=module.gcp_gke \
            -target=module.gcp_secret_manager \
            -no-color \
            -detailed-exitcode \
            -out=tfplan-gcp.out \
            2>&1 | tee terraform-plan-gcp.txt
          echo "exitcode=$?" >> $GITHUB_OUTPUT
        env:
          GOOGLE_OAUTH_ACCESS_TOKEN: ${{ steps.auth_gcp.outputs.access_token }}
          ARM_CLIENT_ID:             ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID:             ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID:       ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC:              "true"
        continue-on-error: true

      - name: Resumo do Plan GCP
        id: plan_summary
        run: |
          SUMMARY=$(grep -E "^Plan:|No changes\." terraform/terraform-plan-gcp.txt || echo "Erro ao gerar plan")
          echo "summary=${SUMMARY}" >> $GITHUB_OUTPUT

      - name: Upload Plan GCP como artefato
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-gcp
          path: |
            terraform/tfplan-gcp.out
            terraform/terraform-plan-gcp.txt
          retention-days: 7

  # ---------------------------------------------------------------------------
  # JOB: Terraform Plan — Azure
  # ---------------------------------------------------------------------------
  terraform-plan-azure:
    name: Terraform Plan Azure
    runs-on: ubuntu-latest
    needs: security-scan
    environment: azure-plan

    outputs:
      plan_exitcode: ${{ steps.plan.outputs.exitcode }}
      plan_summary:  ${{ steps.plan_summary.outputs.summary }}

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Autenticar no Azure via OIDC
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: true

      - name: Terraform Init — Azure
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.AZURE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.AZURE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ secrets.AZURE_STORAGE_CONTAINER }}" \
            -backend-config="key=gcp-azure-platform/terraform.tfstate" \
            -reconfigure
        env:
          ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC:        "true"

      - name: Terraform Plan — Azure (módulos Azure apenas)
        id: plan
        working-directory: terraform
        run: |
          terraform plan \
            -var="gcp_project_id=${{ secrets.GCP_PROJECT_ID }}" \
            -var="gcp_region=us-central1" \
            -var="azure_subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            -var="azure_location=eastus" \
            -var="azure_cicd_principal_id=${{ secrets.AZURE_CLIENT_ID }}" \
            -var="environment=production" \
            -var="app_name=devops-platform" \
            -var="github_org=${{ github.repository_owner }}" \
            -var="github_repo=${{ github.event.repository.name }}" \
            -target=module.azure_networking \
            -target=module.azure_aks \
            -target=module.azure_key_vault \
            -no-color \
            -detailed-exitcode \
            -out=tfplan-azure.out \
            2>&1 | tee terraform-plan-azure.txt
          echo "exitcode=$?" >> $GITHUB_OUTPUT
        env:
          ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC:        "true"
        continue-on-error: true

      - name: Resumo do Plan Azure
        id: plan_summary
        run: |
          SUMMARY=$(grep -E "^Plan:|No changes\." terraform/terraform-plan-azure.txt || echo "Erro ao gerar plan")
          echo "summary=${SUMMARY}" >> $GITHUB_OUTPUT

      - name: Upload Plan Azure como artefato
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-azure
          path: |
            terraform/tfplan-azure.out
            terraform/terraform-plan-azure.txt
          retention-days: 7

  # ---------------------------------------------------------------------------
  # JOB: Comentário no PR com status unificado dos plans
  # ---------------------------------------------------------------------------
  comment-pr:
    name: Comentar Plans no PR
    runs-on: ubuntu-latest
    needs: [terraform-plan-gcp, terraform-plan-azure]
    if: always() && github.event_name == 'pull_request'

    steps:
      - name: Download artefatos dos plans
        uses: actions/download-artifact@v4
        with:
          path: plans/

      - name: Compor comentário unificado
        id: compose
        run: |
          GCP_SUMMARY="${{ needs.terraform-plan-gcp.outputs.plan_summary }}"
          AZURE_SUMMARY="${{ needs.terraform-plan-azure.outputs.plan_summary }}"
          GCP_EXIT="${{ needs.terraform-plan-gcp.outputs.plan_exitcode }}"
          AZURE_EXIT="${{ needs.terraform-plan-azure.outputs.plan_exitcode }}"

          GCP_STATUS="✅ Sucesso"
          AZURE_STATUS="✅ Sucesso"
          [ "$GCP_EXIT" == "1" ] && GCP_STATUS="❌ Erro"
          [ "$AZURE_EXIT" == "1" ] && AZURE_STATUS="❌ Erro"

          GCP_PLAN=""
          AZURE_PLAN=""
          [ -f "plans/terraform-plan-gcp/terraform-plan-gcp.txt" ] && \
            GCP_PLAN=$(tail -30 plans/terraform-plan-gcp/terraform-plan-gcp.txt)
          [ -f "plans/terraform-plan-azure/terraform-plan-azure.txt" ] && \
            AZURE_PLAN=$(tail -30 plans/terraform-plan-azure/terraform-plan-azure.txt)

          cat > /tmp/pr_comment.md << 'COMMENT_EOF'
          ## Terraform Plan — GCP + Azure

          | Cloud | Status | Resumo |
          |-------|--------|--------|
          | GCP   | GCP_STATUS_PLACEHOLDER | GCP_SUMMARY_PLACEHOLDER |
          | Azure | AZURE_STATUS_PLACEHOLDER | AZURE_SUMMARY_PLACEHOLDER |

          <details>
          <summary>📋 Detalhes do Plan GCP</summary>

          ```hcl
          GCP_PLAN_PLACEHOLDER
          ```
          </details>

          <details>
          <summary>📋 Detalhes do Plan Azure</summary>

          ```hcl
          AZURE_PLAN_PLACEHOLDER
          ```
          </details>

          > Commit: `${{ github.sha }}` | Workflow: `${{ github.run_id }}`
          COMMENT_EOF

          sed -i "s|GCP_STATUS_PLACEHOLDER|${GCP_STATUS}|g" /tmp/pr_comment.md
          sed -i "s|AZURE_STATUS_PLACEHOLDER|${AZURE_STATUS}|g" /tmp/pr_comment.md
          sed -i "s|GCP_SUMMARY_PLACEHOLDER|${GCP_SUMMARY}|g" /tmp/pr_comment.md
          sed -i "s|AZURE_SUMMARY_PLACEHOLDER|${AZURE_SUMMARY}|g" /tmp/pr_comment.md

          echo "comment_body<<EOF" >> $GITHUB_OUTPUT
          cat /tmp/pr_comment.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Publicar comentário no PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: terraform-plan-results
          message: ${{ steps.compose.outputs.comment_body }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

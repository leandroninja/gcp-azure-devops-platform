apiVersion: v1
kind: Service
metadata:
  name: sample-app
  namespace: production
  labels:
    app: sample-app
    managed-by: github-actions
  annotations:
    # Indica qual slot está atualmente recebendo tráfego.
    # Atualizado automaticamente pelo script blue-green-switch.sh
    active-slot: "blue"
    last-switch-timestamp: ""
    last-switch-by: ""
spec:
  type: ClusterIP
  # O selector é alterado dinamicamente durante o blue-green switch.
  # Valor inicial: slot blue. O script atualiza para 'green' ou 'blue' conforme necessário.
  selector:
    app: sample-app
    slot: blue     # Alterado pelo CI/CD durante o deploy blue-green
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080
    - name: metrics
      protocol: TCP
      port: 9090
      targetPort: 8080

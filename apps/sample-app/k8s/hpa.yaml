apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sample-app-hpa
  namespace: production
  labels:
    app: sample-app
    managed-by: github-actions
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    # Aponta para o slot ativo. Em blue-green, ambos os slots têm seu próprio HPA.
    # Este HPA gerencia o slot blue (ativo por padrão).
    name: sample-app-blue

  # Limites de escalabilidade
  minReplicas: 2    # Mínimo para HA (garante disponibilidade durante falhas de node)
  maxReplicas: 20   # Máximo para evitar custos excessivos

  metrics:
    # Escala baseado em uso de CPU (threshold: 70%)
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

    # Escala baseado em uso de memória (threshold: 80%)
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

  behavior:
    # Scale UP: rápido para responder a picos de tráfego
    scaleUp:
      stabilizationWindowSeconds: 60   # Aguarda 60s antes de aumentar novamente
      policies:
        - type: Pods
          value: 4
          periodSeconds: 60   # Adiciona até 4 pods por minuto
        - type: Percent
          value: 50
          periodSeconds: 60   # Ou 50% dos pods atuais, o que for maior

    # Scale DOWN: conservador para evitar interrupções
    scaleDown:
      stabilizationWindowSeconds: 300  # Aguarda 5 minutos antes de reduzir
      policies:
        - type: Pods
          value: 2
          periodSeconds: 120  # Remove no máximo 2 pods a cada 2 minutos
---
# HPA para o slot green (inativo por padrão, mantém replicas mínimas)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sample-app-green-hpa
  namespace: production
  labels:
    app: sample-app
    slot: green
    managed-by: github-actions
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sample-app-green

  minReplicas: 2
  maxReplicas: 20

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 4
          periodSeconds: 60
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 2
          periodSeconds: 120

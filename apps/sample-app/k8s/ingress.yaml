apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sample-app
  namespace: production
  labels:
    app: sample-app
    managed-by: github-actions
  annotations:
    # -------------------------------------------------------------------------
    # Anotações GKE (Google Kubernetes Engine)
    # -------------------------------------------------------------------------
    # BackendConfig para configurações avançadas do Google Cloud Load Balancer
    cloud.google.com/backend-config: '{"default": "sample-app-backend-config"}'

    # Usa o ingress controller nativo do GKE (Google Cloud Load Balancer)
    kubernetes.io/ingress.class: "gce"

    # IP estático pré-alocado no GCP
    kubernetes.io/ingress.global-static-ip-name: "sample-app-ip"

    # -------------------------------------------------------------------------
    # Anotações AKS (Azure Kubernetes Service com AGIC)
    # Descomente e comente as anotações GKE ao usar com AKS
    # -------------------------------------------------------------------------
    # kubernetes.io/ingress.class: "azure/application-gateway"
    # appgw.ingress.kubernetes.io/ssl-redirect: "true"
    # appgw.ingress.kubernetes.io/backend-protocol: "http"
    # appgw.ingress.kubernetes.io/health-probe-path: "/health"
    # appgw.ingress.kubernetes.io/health-probe-status-codes: "200-399"
    # appgw.ingress.kubernetes.io/connection-draining: "true"
    # appgw.ingress.kubernetes.io/connection-draining-timeout: "30"

    # -------------------------------------------------------------------------
    # Canary routing (quando em modo canary — gerenciado pelo deploy-canary.yml)
    # -------------------------------------------------------------------------
    # nginx.ingress.kubernetes.io/canary: "true"
    # nginx.ingress.kubernetes.io/canary-weight: "10"

    # TLS via cert-manager (Let's Encrypt)
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"

spec:
  ingressClassName: gce   # Use 'azure/application-gateway' para AKS

  # TLS: cert-manager emite e renova automaticamente
  tls:
    - hosts:
        - app.devops-platform.example.com
      secretName: sample-app-tls-cert

  rules:
    - host: app.devops-platform.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sample-app
                port:
                  name: http
